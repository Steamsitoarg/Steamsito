<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Steamsito Store</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
/* ── RESET ── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

/* ── VARIABLES ── */
:root{
  --bg:#0d0118;
  --bg-card:#170736;
  --accent:#00d4ff;
  --purple:#7b2fff;
  --green:#4caf50;
  --dim:#9b8bb5;
  --border:rgba(255,255,255,0.08);
}

body{
  font-family:'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#1a0842 0%,#0d0118 100%);
  background-attachment:fixed;
  color:#fff;
  min-height:100vh;
}

/* ── NAVBAR ── */
.navbar{
  background:rgba(72,18,156,0.95);
  backdrop-filter:blur(10px);
  width:100%;padding:0;
  position:sticky;top:0;z-index:1000;
  box-shadow:0 4px 15px rgba(0,0,0,0.4);
  border-bottom:1px solid rgba(123,47,255,0.3);
}
.navbar-content{
  max-width:1300px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;gap:20px;
}
.navbar-logo{
  display:flex;align-items:center;gap:12px;
  text-decoration:none;color:#fff;flex-shrink:0;
}
.navbar-logo img{height:70px;width:auto;display:block}
.navbar-logo span{
  font-family:'Press Start 2P',cursive;font-size:20px;
  background:linear-gradient(120deg,#fff 40%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── SEARCH ── */
.search-container{
  flex:1;max-width:520px;height:44px;
  display:flex;align-items:center;
  background:rgba(49,98,130,0.3);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:8px;
  transition:border-color .2s,box-shadow .2s;
}
.search-container:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(0,212,255,0.15);
}
.search-icon-btn{
  background:none;border:none;cursor:pointer;
  padding:0 13px;color:rgba(255,255,255,0.6);
  display:flex;align-items:center;flex-shrink:0;transition:color .2s;
}
.search-icon-btn:hover{color:var(--accent)}
.search-icon-btn svg{width:18px;height:18px;fill:currentColor}
.main-search-input{
  background:none;border:none;outline:none;
  color:#fff;font-size:14px;width:100%;padding-right:12px;
}
.main-search-input::placeholder{color:rgba(255,255,255,0.45)}

/* ── NAV ICONS ── */
.nav-icons{display:flex;align-items:center;gap:8px;flex-shrink:0}
.nav-btn{
  background:none;border:none;cursor:pointer;
  padding:8px;border-radius:8px;color:rgba(255,255,255,0.6);
  display:flex;align-items:center;justify-content:center;
  position:relative;transition:background .2s,color .2s;
}
.nav-btn:hover{background:rgba(255,255,255,0.08);color:var(--accent)}
.nav-btn svg{width:30px;height:30px;fill:currentColor;display:block}
.cart-counter{
  position:absolute;top:2px;right:2px;
  background:#e53935;color:#fff;
  font-size:10px;font-weight:700;border-radius:50%;
  width:18px;height:18px;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transform:scale(0);
  transition:opacity .25s,transform .25s;
}
.cart-counter.active{opacity:1;transform:scale(1)}

/* ── HERO ── */
.hero-banner{max-width:1300px;margin:32px auto 0;padding:0 24px}
.hero-inner{
  background:linear-gradient(135deg,rgba(123,47,255,.25) 0%,rgba(0,212,255,.08) 100%);
  border:1px solid rgba(123,47,255,.35);border-radius:14px;
  padding:28px 36px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  position:relative;overflow:hidden;
}
.hero-inner::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 80% at 85% 50%,rgba(0,212,255,.06),transparent);
  pointer-events:none;
}
.hero-text h1{
  font-family:'Press Start 2P',cursive;font-size:14px;line-height:1.9;
  background:linear-gradient(90deg,#fff 50%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:10px;
}
.hero-text p{font-size:13px;color:var(--dim);line-height:1.7}
.hero-badge{
  background:linear-gradient(135deg,var(--purple),var(--accent));
  color:#fff;font-family:'Press Start 2P',cursive;font-size:9px;
  padding:14px 24px;border-radius:10px;text-align:center;
  white-space:nowrap;flex-shrink:0;line-height:2.4;
  box-shadow:0 0 24px rgba(123,47,255,.55);
}

/* ── SECTION HEADER ── */
.section-header{
  max-width:1300px;margin:30px auto 18px;padding:0 24px;
  display:flex;align-items:center;gap:12px;
}
.section-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
  background:var(--accent);box-shadow:0 0 8px var(--accent);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.35;transform:scale(.55)}}
.section-header h2{font-family:'Press Start 2P',cursive;font-size:11px;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,rgba(123,47,255,.55),transparent)}

.results-info{
  max-width:1300px;margin:0 auto 14px;padding:0 24px;
  font-size:13px;color:var(--dim);display:none;
}
.results-info span{color:var(--accent);font-weight:600}

/* ── STORE ── */
.store-container{max-width:1300px;margin:0 auto;padding:0 24px}

/* ── GRID ── */
.game-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:20px;min-height:300px;
}

/* ── CARD ── */
.game-card{
  background:var(--bg-card);
  border-radius:6px;overflow:hidden;
  position:relative;
  border:1px solid var(--border);
  cursor:pointer;
  animation:cardIn .3s ease both;
  transition:transform .25s ease,border-color .25s ease,box-shadow .25s ease;
}
.game-card:hover{
  transform:translateY(-6px);
  border-color:var(--accent);
  box-shadow:0 12px 32px rgba(0,212,255,.22);
}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* Imagen 3:4 */
.card-img-wrap{
  position:relative;width:100%;padding-top:133%;
  background:#0b021c;overflow:hidden;
}
.card-img-wrap img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;
  transition:transform .4s ease;
}
.game-card:hover .card-img-wrap img{transform:scale(1.06)}

/* fallback placeholder */
.img-fallback{
  position:absolute;inset:0;
  display:none;
  flex-direction:column;align-items:center;justify-content:center;
  background:linear-gradient(135deg,#1a0336,#0d0118);
  color:var(--dim);font-size:11px;text-align:center;padding:12px;gap:8px;
}
.img-fallback svg{width:44px;height:44px;opacity:.35;fill:var(--dim)}

.card-platform{
  position:absolute;top:8px;left:8px;
  background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  color:#fff;font-size:10px;padding:3px 8px;
  border-radius:4px;display:flex;align-items:center;gap:5px;
  pointer-events:none;
}
.card-platform svg{width:10px;height:10px;fill:currentColor}

/* SLIDE-UP info */
.info-wrapper{
  position:absolute;bottom:0;left:0;right:0;
  background:linear-gradient(to top,rgba(13,1,24,.98) 80%,transparent);
  padding:14px;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.25,.46,.45,.94);
  z-index:3;
}
.game-card:hover .info-wrapper{transform:translateY(0)}
.info-wrapper h3{
  font-size:12px;font-weight:600;line-height:1.45;margin-bottom:10px;
  display:-webkit-box;-webkit-line-clamp:2;
  -webkit-box-orient:vertical;overflow:hidden;
}
.price-row{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.price-label{font-size:10px;color:var(--dim)}

.card-actions{display:flex;flex-direction:column;gap:6px}
.btn{
  width:100%;padding:9px 0;border-radius:4px;
  font-family:'Segoe UI',sans-serif;font-size:12px;font-weight:700;
  cursor:pointer;text-align:center;border:none;
  transition:background .2s,box-shadow .2s,transform .1s;
}
.btn:active{transform:scale(.97)}
.btn-cart{background:var(--accent);color:#000}
.btn-cart:hover{background:#55e2ff;box-shadow:0 0 14px rgba(0,212,255,.5)}
.btn-detail{
  background:transparent;color:#fff;
  border:1px solid rgba(255,255,255,.2)!important;
}
.btn-detail:hover{background:rgba(255,255,255,.1)}

/* ── NO RESULTS ── */
.no-results{
  grid-column:1/-1;text-align:center;padding:80px 20px;color:var(--dim);
}
.no-results .nr-icon{font-size:52px;margin-bottom:16px}
.no-results h3{font-family:'Press Start 2P',cursive;font-size:10px;color:#fff;margin-bottom:10px}

/* ── PAGINATION ── */
.pagination-container{
  display:flex;justify-content:center;align-items:center;
  gap:6px;margin:48px 0 36px;flex-wrap:wrap;
}
.page-btn{
  min-width:42px;height:42px;padding:0 10px;
  background:var(--bg-card);border:1px solid rgba(255,255,255,.15);
  color:#fff;border-radius:4px;cursor:pointer;
  font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  transition:all .2s;
}
.page-btn:hover:not(.active):not([disabled]){
  border-color:var(--accent);color:var(--accent);
  background:rgba(0,212,255,.08);
}
.page-btn.active{
  background:var(--accent);color:#000;
  border-color:var(--accent);pointer-events:none;font-weight:700;
}
.page-btn[disabled]{opacity:.3;cursor:not-allowed}
.page-ellipsis{color:var(--dim);padding:0 4px;font-size:18px;display:flex;align-items:center}

/* ── DIRECTORY ── */
.dir-section{
  background:rgba(0,0,0,.35);border:1px solid var(--border);
  border-radius:10px;padding:28px;margin:16px 0 60px;
}
.dir-section h2{
  font-size:16px;font-weight:600;color:var(--accent);
  margin-bottom:20px;padding-bottom:12px;
  border-bottom:1px solid rgba(0,212,255,.18);
  display:flex;align-items:center;gap:8px;
}
.directory-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:4px 16px;
}
.directory-item{
  font-size:13px;color:var(--dim);
  padding:5px 0 5px 15px;position:relative;
  transition:color .2s;white-space:nowrap;
  overflow:hidden;text-overflow:ellipsis;
}
.directory-item::before{content:"•";position:absolute;left:0;color:var(--accent)}
.directory-item:hover{color:#fff;cursor:default}

/* ── TOAST ── */
#toast-container{
  position:fixed;bottom:28px;right:28px;
  display:flex;flex-direction:column;gap:10px;z-index:9999;
}
.toast{
  background:linear-gradient(135deg,#1b6b1e,#2e9b32);
  color:#fff;padding:14px 22px;border-radius:10px;
  font-size:14px;font-weight:600;
  box-shadow:0 6px 22px rgba(0,0,0,.5);
  opacity:0;transform:translateX(110%);
  transition:opacity .3s,transform .3s;max-width:320px;
}
.toast.show{opacity:1;transform:translateX(0)}

hr.sep{border:none;border-top:1px solid rgba(255,255,255,.06);margin:24px 0}
</style>
</head>

// ── CATALOGO ORDENADO ──
const catalogoOrdenado = [
    ...JUEGOS_DESTACADOS.filter(j => CATALOGO_NOMBRES.includes(j)),
    ...CATALOGO_NOMBRES.filter(j => !JUEGOS_DESTACADOS.includes(j))
];

// ── ESTADO ──
let filtrados = [...catalogoOrdenado];
let pagActual = 1;
const POR_PAG = 20;
let buscando  = false;
let debounce;

// ── DOM ──
const grid       = document.getElementById('contenedor-juegos');
const inputSearch= document.getElementById('input-busqueda');
const dirGrid    = document.getElementById('lista-texto-inferior');
const toastCont  = document.getElementById('toast-container');
const paginaCont = document.getElementById('paginacion');
const resInfo    = document.getElementById('results-info');
const secTitle   = document.getElementById('section-title');
const cartEl     = document.getElementById('cart-counter');

// ── IMAGEN UTILS ──
function getCover(n){
    const id = STEAM_IDS[n];
    return id ? `https://steamcdn-a.akamaihd.net/steam/apps/${id}/library_600x900_2x.jpg` : null;
}
function getHeader(n){
    const id = STEAM_IDS[n];
    return id ? `https://cdn.cloudflare.steamstatic.com/steam/apps/${id}/header.jpg` : null;
}
function getCapsule(n){
    const id = STEAM_IDS[n];
    return id ? `https://cdn.cloudflare.steamstatic.com/steam/apps/${id}/capsule_616x353.jpg` : null;
}

// ── DIRECTORIO ──
function renderDirectorio(lista){
    dirGrid.innerHTML = lista.map(n => `<div class="directory-item">${n}</div>`).join('');
}

// ── CARDS ──
function renderJuegos(){
    const tanda = buscando
        ? filtrados
        : filtrados.slice((pagActual-1)*POR_PAG, pagActual*POR_PAG);

    if(!tanda.length){
        grid.innerHTML = `<div class="no-results"><div class="nr-icon">🔍</div><h3>Sin resultados</h3><p>Probá con otro nombre.</p></div>`;
        renderPaginacion(); return;
    }

    grid.innerHTML = '';
    tanda.forEach((nombre, i) => {
        const cover   = getCover(nombre);
        const header  = getHeader(nombre);
        const capsule = getCapsule(nombre);
        const appID   = STEAM_IDS[nombre];

        const card = document.createElement('div');
        card.className = 'game-card';
        card.style.animationDelay = `${i * 0.025}s`;

        // Imagen con 3 fallbacks: portrait → header → capsule → placeholder
        const imgTag = cover
            ? `<img src="${cover}" alt="${nombre.replace(/"/g,'&quot;')}" loading="lazy"
                 onerror="(function(el){
                   el.onerror=null;
                   el.onerror=function(){
                     el.onerror=null;
                     ${capsule ? `el.src='${capsule}';el.onerror=function(){el.style.display='none';el.nextElementSibling.style.display='flex'};` : `el.style.display='none';el.nextElementSibling.style.display='flex';`}
                   };
                   el.src='${header}';
                 })(this)">`
            : '';

        card.innerHTML = `
        <div class="card-img-wrap">
          ${imgTag}
          <div class="img-fallback"${cover ? '' : ' style="display:flex"'}>
            <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z"/></svg>
            <span>${nombre.substring(0,24)}${nombre.length>24?'…':''}</span>
          </div>
          <div class="card-platform">
            <svg viewBox="0 0 16 16"><path d="M.329 10.333A8.01 8.01 0 0 0 7.99 16C12.414 16 16 12.418 16 8s-3.586-8-8.009-8A8.006 8.006 0 0 0 0 7.468l.003.006 4.304 1.769A2.2 2.2 0 0 1 5.62 8.88l1.96-2.844-.001-.04a3.046 3.046 0 0 1 3.042-3.043 3.046 3.046 0 0 1 3.042 3.043 3.047 3.047 0 0 1-3.111 3.044l-2.804 2a2.223 2.223 0 0 1-3.075 2.11 2.22 2.22 0 0 1-1.312-1.568L.33 10.333Z"/></svg>
            Steam
          </div>
        </div>
        <div class="info-wrapper">
          <h3>${nombre}</h3>
          <div class="price-row"><span class="price-label">Consultar precio</span></div>
          <div class="card-actions">
            <button class="btn btn-cart" data-title="${nombre.replace(/"/g,'&quot;')}">🛒 Al Carrito</button>
            ${appID
                ? `<a href="https://store.steampowered.com/app/${appID}" target="_blank" rel="noopener" style="text-decoration:none"><button class="btn btn-detail" style="width:100%">Ver en Steam</button></a>`
                : `<button class="btn btn-detail">Ver Detalles</button>`
            }
          </div>
        </div>`;
        grid.appendChild(card);
    });
    renderPaginacion();
}

// ── PAGINACIÓN ──
function renderPaginacion(){
    paginaCont.innerHTML = '';
    if(buscando || filtrados.length <= POR_PAG) return;
    const total = Math.ceil(filtrados.length / POR_PAG);

    const mk = (label, pag, activo=false, disabled=false) => {
        const b = document.createElement('button');
        b.className = 'page-btn' + (activo ? ' active' : '');
        b.innerHTML = label; b.disabled = disabled;
        if(!disabled && !activo) b.onclick = () => cambiarPagina(pag);
        return b;
    };
    const dots = () => { const s=document.createElement('span'); s.className='page-ellipsis'; s.textContent='…'; return s; };

    paginaCont.appendChild(mk('«', pagActual-1, false, pagActual===1));
    const ini = Math.max(1, pagActual-2);
    const fin = Math.min(total, pagActual+2);
    if(ini > 1){ paginaCont.appendChild(mk(1,1)); if(ini>2) paginaCont.appendChild(dots()); }
    for(let i=ini; i<=fin; i++) paginaCont.appendChild(mk(i, i, i===pagActual));
    if(fin < total){ if(fin<total-1) paginaCont.appendChild(dots()); paginaCont.appendChild(mk(total,total)); }
    paginaCont.appendChild(mk('»', pagActual+1, false, pagActual===total));
}

function cambiarPagina(p){
    pagActual = p;
    window.scrollTo({top:0, behavior:'smooth'});
    renderJuegos();
}

// ── BÚSQUEDA ──
function filtrar(){
    const q = inputSearch.value.trim().toLowerCase();
    if(!q){
        buscando=false; filtrados=[...catalogoOrdenado]; pagActual=1;
        secTitle.textContent='Juegos Destacados';
        resInfo.style.display='none';
    } else {
        buscando=true;
        filtrados = catalogoOrdenado.filter(n => n.toLowerCase().includes(q));
        secTitle.textContent='Resultados de Búsqueda';
        resInfo.style.display='block';
        resInfo.innerHTML=`Se encontraron <span>${filtrados.length}</span> juego${filtrados.length!==1?'s':''} para "<span>${inputSearch.value.trim()}</span>"`;
    }
    renderDirectorio(filtrados);
    renderJuegos();
}
inputSearch.addEventListener('input', () => { clearTimeout(debounce); debounce=setTimeout(filtrar, 150); });

// ── TOAST ──
function toast(msg){
    const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
    toastCont.appendChild(t);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 3000);
}

// ── CARRITO ──
let cartCount = 0;
document.addEventListener('click', e => {
    const b = e.target.closest('.btn-cart'); if(!b) return;
    cartCount++; cartEl.textContent=cartCount; cartEl.classList.add('active');
    const title = b.dataset.title;
    toast(`🛒 ¡${title} añadido!`);
    const orig = b.innerHTML;
    b.innerHTML='✓ ¡Añadido!'; b.style.background='#4caf50'; b.style.color='#fff';
    setTimeout(() => { b.innerHTML=orig; b.style.background=''; b.style.color=''; }, 1600);
});

// ── INIT ──
renderDirectorio(filtrados);
renderJuegos();
</script>
