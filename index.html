    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg:      #0d0118;
            --bg-card: #130226;
            --accent:  #00d4ff;
            --purple:  #7b2fff;
            --green:   #4caf50;
            --dim:     #9b8bb5;
            --border:  rgba(255,255,255,0.07);
        }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg); color: #fff; min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(123,47,255,0.2) 0%, transparent 65%),
                radial-gradient(ellipse 50% 40% at 100% 70%, rgba(0,212,255,0.07) 0%, transparent 55%);
            background-attachment: fixed;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(10,1,20,0.96); backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(123,47,255,0.22);
            position: sticky; top: 0; z-index: 1000;
            box-shadow: 0 2px 24px rgba(0,0,0,0.7);
        }
        .navbar-content {
            max-width: 1300px; margin: 0 auto;
            display: flex; align-items: center; justify-content: space-between;
            padding: 14px 24px; gap: 20px;
        }
        .navbar-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; flex-shrink: 0; }
        .navbar-logo img { height: 58px; width: auto; display: block; }
        .logo-text {
            font-family: 'Press Start 2P', cursive; font-size: 16px;
            background: linear-gradient(120deg, #fff 40%, var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .search-container {
            flex: 1; max-width: 520px; height: 44px;
            display: flex; align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(123,47,255,0.4); border-radius: 10px;
            transition: border-color .2s, box-shadow .2s;
        }
        .search-container:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,255,0.12); }
        .search-icon-btn { background: none; border: none; cursor: pointer; padding: 0 13px; color: var(--dim); display: flex; align-items: center; flex-shrink: 0; transition: color .2s; }
        .search-icon-btn:hover { color: var(--accent); }
        .search-icon-btn svg { width: 17px; height: 17px; fill: currentColor; }
        .main-search-input { background: none; border: none; outline: none; color: #fff; font-size: 14px; width: 100%; padding-right: 12px; }
        .main-search-input::placeholder { color: var(--dim); }
        .nav-icons { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
        .nav-btn { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; color: var(--dim); display: flex; align-items: center; justify-content: center; position: relative; transition: background .2s, color .2s; }
        .nav-btn:hover { background: rgba(255,255,255,0.07); color: var(--accent); }
        .nav-btn svg { width: 28px; height: 28px; fill: currentColor; display: block; }
        .cart-counter { position: absolute; top: 2px; right: 2px; background: #e53935; color: #fff; font-size: 10px; font-weight: 700; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0); transition: opacity .25s, transform .25s; }
        .cart-counter.active { opacity: 1; transform: scale(1); }

        /* HERO */
        .hero-banner { max-width: 1300px; margin: 32px auto 0; padding: 0 24px; }
        .hero-inner {
            background: linear-gradient(135deg, rgba(123,47,255,.22) 0%, rgba(0,212,255,.08) 100%);
            border: 1px solid rgba(123,47,255,.3); border-radius: 14px;
            padding: 30px 36px; display: flex; align-items: center; justify-content: space-between; gap: 16px;
            position: relative; overflow: hidden;
        }
        .hero-inner::before { content:''; position:absolute; inset:0; background: radial-gradient(ellipse 55% 80% at 85% 50%, rgba(0,212,255,.05), transparent); pointer-events: none; }
        .hero-text h1 { font-family: 'Press Start 2P', cursive; font-size: 13px; line-height: 1.9; background: linear-gradient(90deg, #fff 50%, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px; }
        .hero-text p { font-size: 13px; color: var(--dim); line-height: 1.6; }
        .hero-badge { background: linear-gradient(135deg, var(--purple), var(--accent)); color: #fff; font-family: 'Press Start 2P', cursive; font-size: 9px; padding: 12px 22px; border-radius: 8px; text-align: center; white-space: nowrap; flex-shrink: 0; line-height: 2.2; box-shadow: 0 0 20px rgba(123,47,255,.5); }

        /* SECTION HEADER */
        .section-header { max-width: 1300px; margin: 30px auto 18px; padding: 0 24px; display: flex; align-items: center; gap: 12px; }
        .section-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: blink 2s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.6)} }
        .section-header h2 { font-family: 'Press Start 2P', cursive; font-size: 11px; white-space: nowrap; }
        .section-line { flex: 1; height: 1px; background: linear-gradient(90deg, rgba(123,47,255,.5), transparent); }
        .results-info { max-width: 1300px; margin: 0 auto 14px; padding: 0 24px; font-size: 13px; color: var(--dim); display: none; }
        .results-info span { color: var(--accent); font-weight: 600; }

        /* STORE */
        .store-container { max-width: 1300px; margin: 0 auto; padding: 0 24px; }

        /* GRID */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(185px, 1fr)); gap: 18px; min-height: 200px; }

        /* CARD */
        .game-card { background: var(--bg-card); border-radius: 8px; overflow: hidden; position: relative; border: 1px solid var(--border); cursor: pointer; animation: cardIn .3s ease both; transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,212,255,.2); }
        @keyframes cardIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        .card-img-wrap { position: relative; width: 100%; padding-top: 133%; background: #0a0118; overflow: hidden; }
        .card-img-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: center; transition: transform .4s ease; }
        .game-card:hover .card-img-wrap img { transform: scale(1.06); }
        .card-img-wrap .img-fallback { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a0336, #0d0118); color: var(--dim); font-size: 11px; text-align: center; padding: 12px; gap: 10px; }
        .card-img-wrap .img-fallback svg { width: 40px; height: 40px; opacity: .4; fill: var(--dim); }
        .card-platform { position: absolute; top: 8px; left: 8px; background: rgba(0,0,0,.7); backdrop-filter: blur(4px); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 4px; display: flex; align-items: center; gap: 4px; pointer-events: none; }
        .card-platform svg { width: 10px; height: 10px; fill: currentColor; }

        /* SLIDE-UP */
        .info-wrapper { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(13,1,24,.98) 85%, transparent); padding: 14px; transform: translateY(100%); transition: transform .3s cubic-bezier(.25,.46,.45,.94); z-index: 3; }
        .game-card:hover .info-wrapper { transform: translateY(0); }
        .info-wrapper h3 { font-size: 12px; font-weight: 600; line-height: 1.45; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
        .price-label { font-size: 10px; color: var(--dim); }
        .price { font-size: 18px; font-weight: 700; color: var(--green); text-shadow: 0 0 10px rgba(76,175,80,.4); }
        .card-actions { display: flex; flex-direction: column; gap: 6px; }
        .btn { width: 100%; padding: 9px 0; border-radius: 6px; font-family: 'Segoe UI', sans-serif; font-size: 12px; font-weight: 700; cursor: pointer; text-align: center; border: none; transition: background .2s, box-shadow .2s, transform .1s; }
        .btn:active { transform: scale(.97); }
        .btn-cart { background: var(--accent); color: #000; }
        .btn-cart:hover { background: #4de4ff; box-shadow: 0 0 14px rgba(0,212,255,.5); }
        .btn-detail { background: rgba(255,255,255,.05); color: #fff; border: 1px solid rgba(255,255,255,.18) !important; }
        .btn-detail:hover { background: rgba(255,255,255,.12); }

        /* NO RESULTS */
        .no-results { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--dim); }
        .no-results .nr-icon { font-size: 48px; margin-bottom: 16px; }
        .no-results h3 { font-family: 'Press Start 2P', cursive; font-size: 10px; color:#fff; margin-bottom:10px; }

        /* PAGINATION */
        .pagination-container { display: flex; justify-content: center; align-items: center; gap: 6px; margin: 48px 0 36px; flex-wrap: wrap; }
        .page-btn { min-width: 40px; height: 40px; padding: 0 10px; background: var(--bg-card); border: 1px solid rgba(255,255,255,.12); color: var(--dim); border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .page-btn:hover:not(.active):not([disabled]) { border-color: var(--accent); color: var(--accent); background: rgba(0,212,255,.07); }
        .page-btn.active { background: var(--accent); color: #000; border-color: var(--accent); pointer-events: none; font-weight: 700; }
        .page-btn[disabled] { opacity: .3; cursor: not-allowed; }
        .page-ellipsis { color: var(--dim); padding: 0 4px; font-size: 16px; display: flex; align-items: center; }

        /* DIRECTORY */
        .dir-section { background: rgba(255,255,255,.02); border: 1px solid var(--border); border-radius: 12px; padding: 26px; margin: 16px 0 56px; }
        .dir-section h2 { font-size: 15px; font-weight: 600; color: var(--accent); margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid rgba(0,212,255,.15); display: flex; align-items: center; gap: 8px; }
        .directory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 4px 16px; }
        .directory-item { font-size: 12px; color: var(--dim); padding: 4px 0 4px 14px; position: relative; transition: color .2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .directory-item::before { content:"›"; position:absolute; left:0; color: var(--purple); }
        .directory-item:hover { color: #fff; }

        /* TOAST */
        #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 9999; }
        .toast { background: linear-gradient(135deg,#1b6b1e,#2e9b32); color:#fff; padding: 13px 20px; border-radius: 10px; font-size: 13px; font-weight: 600; box-shadow: 0 6px 20px rgba(0,0,0,.5); opacity:0; transform: translateX(110%); transition: opacity .3s, transform .3s; max-width: 300px; }
        .toast.show { opacity:1; transform: translateX(0); }
        hr.sep { border: none; border-top: 1px solid rgba(255,255,255,.06); margin: 24px 0; }
    </style>
</head>

// Directorio
function renderDirectorio(lista) {
    dirGrid.innerHTML = lista.map(n => `<div class="directory-item">${n}</div>`).join('');
}

// Obtener URL de imagen — directo desde Steam CDN, sin API
function getCover(nombre) {
    const id = STEAM_IDS[nombre];
    if (id) return `https://steamcdn-a.akamaihd.net/steam/apps/${id}/library_600x900_2x.jpg`;
    return null;
}

function getHeader(nombre) {
    const id = STEAM_IDS[nombre];
    if (id) return `https://cdn.cloudflare.steamstatic.com/steam/apps/${id}/header.jpg`;
    return null;
}

// Render cards — sin fetch, instantáneo
function renderJuegos() {
    const tanda = buscando
        ? filtrados
        : filtrados.slice((pagActual - 1) * POR_PAG, pagActual * POR_PAG);

    if (tanda.length === 0) {
        grid.innerHTML = `
            <div class="no-results">
                <div class="nr-icon">🔍</div>
                <h3>Sin resultados</h3>
                <p>No encontramos juegos para tu búsqueda.</p>
            </div>`;
        renderPaginacion();
        return;
    }

    grid.innerHTML = '';
    tanda.forEach((nombre, i) => {
        const cover  = getCover(nombre);
        const header = getHeader(nombre);
        const appID  = STEAM_IDS[nombre];

        const card = document.createElement('div');
        card.className = 'game-card';
        card.style.animationDelay = `${i * 0.025}s`;

        const imgHTML = cover
            ? `<img src="${cover}"
                    alt="${nombre}"
                    loading="lazy"
                    onerror="this.onerror=null;this.src='${header}';this.onerror=function(){this.style.display='none';this.nextElementSibling.style.display='flex';}">`
            : '';

        const fallbackHTML = `
            <div class="img-fallback" style="${cover ? 'display:none' : 'display:flex'}">
                <svg viewBox="0 0 24 24"><path d="M21 6H3c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-10 7H8v3H6v-3H3v-2h3V8h2v3h3v2zm4.5 2c-.83 0-1.5-.67-1.5-1.5S14.67 12 15.5 12s1.5.67 1.5 1.5S16.33 15 15.5 15zm3-3c-.83 0-1.5-.67-1.5-1.5S17.67 10 18.5 10s1.5.67 1.5 1.5S19.33 12 18.5 12z"/></svg>
                <span>${nombre.substring(0,22)}${nombre.length>22?'…':''}</span>
            </div>`;

        card.innerHTML = `
            <div class="card-img-wrap">
                ${imgHTML}
                ${fallbackHTML}
                <div class="card-platform">
                    <svg viewBox="0 0 16 16"><path d="M.329 10.333A8.01 8.01 0 0 0 7.99 16C12.414 16 16 12.418 16 8s-3.586-8-8.009-8A8.006 8.006 0 0 0 0 7.468l.003.006 4.304 1.769A2.2 2.2 0 0 1 5.62 8.88l1.96-2.844-.001-.04a3.046 3.046 0 0 1 3.042-3.043 3.046 3.046 0 0 1 3.042 3.043 3.047 3.047 0 0 1-3.111 3.044l-2.804 2a2.223 2.223 0 0 1-3.075 2.11 2.22 2.22 0 0 1-1.312-1.568L.33 10.333Z"/></svg>
                    Steam
                </div>
            </div>
            <div class="info-wrapper">
                <h3>${nombre}</h3>
                <div class="price-row">
                    <span class="price-label">Consultar precio:</span>
                </div>
                <div class="card-actions">
                    <button class="btn btn-cart" data-title="${nombre}">🛒 Al Carrito</button>
                    ${appID ? `<a href="https://store.steampowered.com/app/${appID}" target="_blank" style="text-decoration:none"><button class="btn btn-detail" style="width:100%">Ver en Steam</button></a>` : '<button class="btn btn-detail">Ver Detalles</button>'}
                </div>
            </div>`;
        grid.appendChild(card);
    });

    renderPaginacion();
}

// Paginación
function renderPaginacion() {
    paginaCont.innerHTML = '';
    if (buscando || filtrados.length <= POR_PAG) return;
    const total = Math.ceil(filtrados.length / POR_PAG);
    const mkBtn = (label, pag, activo=false, disabled=false) => {
        const b = document.createElement('button');
        b.className = 'page-btn' + (activo ? ' active' : '');
        b.innerHTML = label; b.disabled = disabled;
        if (!disabled && !activo) b.onclick = () => cambiarPagina(pag);
        return b;
    };
    const mkDots = () => { const s=document.createElement('span'); s.className='page-ellipsis'; s.textContent='…'; return s; };
    paginaCont.appendChild(mkBtn('«', pagActual-1, false, pagActual===1));
    const ini = Math.max(1, pagActual-2), fin = Math.min(total, pagActual+2);
    if (ini>1) { paginaCont.appendChild(mkBtn(1,1)); if (ini>2) paginaCont.appendChild(mkDots()); }
    for (let i=ini; i<=fin; i++) paginaCont.appendChild(mkBtn(i,i,i===pagActual));
    if (fin<total) { if (fin<total-1) paginaCont.appendChild(mkDots()); paginaCont.appendChild(mkBtn(total,total)); }
    paginaCont.appendChild(mkBtn('»', pagActual+1, false, pagActual===total));
}

function cambiarPagina(p) {
    pagActual = p;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    renderJuegos();
}

// Búsqueda
function filtrar() {
    const q = inputSearch.value.trim().toLowerCase();
    if (q === '') {
        buscando = false; filtrados = [...catalogoOrdenado]; pagActual = 1;
        secTitle.textContent = 'Juegos Destacados'; resInfo.style.display = 'none';
    } else {
        buscando = true;
        filtrados = catalogoOrdenado.filter(n => n.toLowerCase().includes(q));
        secTitle.textContent = 'Resultados de Búsqueda';
        resInfo.style.display = 'block';
        resInfo.innerHTML = `Se encontraron <span>${filtrados.length}</span> juego${filtrados.length!==1?'s':''} para "<span>${inputSearch.value.trim()}</span>"`;
    }
    renderDirectorio(filtrados);
    renderJuegos();
}

inputSearch.addEventListener('input', () => {
    clearTimeout(debounce);
    debounce = setTimeout(filtrar, buscando ? 0 : 150);
});

// Toast
function toast(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    toastCont.appendChild(t);
    requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
    setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 350); }, 3000);
}

// Carrito
let cartCount = 0;
document.addEventListener('click', e => {
    const b = e.target.closest('.btn-cart');
    if (!b) return;
    cartCount++; cartEl.textContent = cartCount; cartEl.classList.add('active');
    const title = b.dataset.title;
    toast(`🛒 ¡${title} añadido!`);
    const orig = b.innerHTML;
    b.innerHTML = '✓ ¡Añadido!'; b.style.background='#4caf50'; b.style.color='#fff';
    setTimeout(()=>{ b.innerHTML=orig; b.style.background=''; b.style.color=''; }, 1600);
});

// Init
renderDirectorio(filtrados);
renderJuegos();
</script>
</body>
